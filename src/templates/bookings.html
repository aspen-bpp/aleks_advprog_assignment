<!DOCTYPE html>
<html>
<head>
    <title>Bookings</title>
</head>
<body>
    <h2>Bookings</h2>

    <table border="1">
        <thead>
            <tr>
                <th>user ID</th>
                <th>Desk ID</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Created</th>
            </tr>
        </thead>
        <tbody>
            {% for booking in bookings %}
            <tr>
                <td>{{ booking.user_id }}</td>
                <td>{{ booking.desk_id }}</td>
                <td>{{ booking.start_date }}</td>
                <td>{{ booking.end_date }}</td>
                <td>{{ booking.created }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <br>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
